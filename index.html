<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Repo Connect</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        #message-box { font-weight: bold; color: #4CAF50; font-size: 20px; margin-top: 20px; }
    </style>
</head>
<body>
        <h2>Login Page</h2>
    <!-- Removed action and method attributes to prevent standard page reloads -->
    <form id="loginForm" onsubmit="event.preventDefault(); submitLogin();">
        <label>Username:</label><br>
        <input type="text" id="username" required><br><br>
        
        <label>Password:</label><br>
        <input type="password" id="password" required><br><br>
        
        <!-- Changed type to submit so validation works, but onsubmit handles execution -->
        <button type="submit">Login</button>
    </form>
    <p style="color: gray;">Hint: Use admin/password123 or user/password123</p>

    <h1>Frontend Repository Page</h1>
    <button onclick="fetchData()">Get Server Data</button>
    
    <div id="message-box">Click the button to load live data...</div>

    <script>
       async function loginUser(username, password) {
    try {
        const response = await fetch('/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json' // Fix #1
            },
            body: JSON.stringify({ username, password }), // Fix #2
            credentials: 'include' // Fix #3
        });

        // Fix #4: Read the JSON regardless of status code to get the message
        const data = await response.json(); 

        if (response.ok && data.success) {
            console.log(data.message); // "Login successful!"
            // Do your frontend redirect here (e.g., window.location.href = '/dashboard')
        } else {
            console.error("Login failed:", data.message); // "Invalid username or password."
            alert(data.message);
        }
    } catch (error) {
        console.error("Network error occurred:", error);
    }
}

        function fetchData() {
            const messageBox = document.getElementById('message-box');
            messageBox.innerText = "Loading data...";

            // REPLACE THIS URL with your actual live Render Web Service URL from Part 1
            const BACKEND_URL = "https://studentbackend-zzbp.onrender.com"; 

            // Make the network request to your server's endpoint
            fetch(`${BACKEND_URL}/api/message`)
                .then(response => response.json())
                .then(data => {
                    // Update the HTML page with the text sent by your server.js file
                    messageBox.innerText = data.text;
                })
                .catch(error => {
                    console.error("Error connecting:", error);
                    messageBox.innerText = "Failed to connect to backend.";
                });
        }
    </script>
</body>
</html>
