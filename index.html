<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h2>Login Portal</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required><br><br>
        <input type="password" id="password" placeholder="Password" required><br><br>
        <button type="submit">Login</button>
    </form>
    <p id="errorMessage" style="color: red;"></p>

    <script>
        const RENDER_URL = 'https://onrender.com';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            try {
                const response = await fetch(`${RENDER_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Stash current structural profile keys locally inside the browser
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role);

                    if (data.role === 'admin') {
                        window.location.href = 'admindisplay.html';
                    } else {
                        window.location.href = 'userdisplay.html';
                    }
                } else {
                    errorMsg.textContent = data.message;
                }
            } catch (error) {
                errorMsg.textContent = 'Could not establish connection to the backend server.';
            }
        });
    </script>
</body>
</html>
