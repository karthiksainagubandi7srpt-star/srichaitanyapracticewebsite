<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Repo Connect</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        #message-box { font-weight: bold; color: #4CAF50; font-size: 20px; margin-top: 20px; }
    </style>
</head>
<body>
        <h2>Login Page</h2>
    <!-- Removed action and method attributes to prevent standard page reloads -->
    <form id="loginForm" onsubmit="event.preventDefault(); submitLogin();">
        <label>Username:</label><br>
        <input type="text" id="username" required><br><br>
        
        <label>Password:</label><br>
        <input type="password" id="password" required><br><br>
        
        <!-- Changed type to submit so validation works, but onsubmit handles execution -->
        <button type="submit">Login</button>
    </form>
    <p style="color: gray;">Hint: Use admin/password123 or user/password123</p>

    <h1>Frontend Repository Page</h1>
    <button onclick="fetchData()">Get Server Data</button>
    
    <div id="message-box">Click the button to load live data...</div>

    <script>
        function submitLogin() {
    // Corrected the broken typo in your original URL string (.onrender.com)
    const BACKEND_URL = "https://onrender.com";

    // Grab actual values from the input elements
    const usernameInput = document.getElementById('username').value;
    const passwordInput = document.getElementById('password').value;

    fetch(`${BACKEND_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: usernameInput, password: passwordInput })
    })
    .then(response => response.json())
    .then(data => {
        // Checks if your server.js returns a successful login status
        if (data.success) {
            window.location.href = "dashboard.html"; 
        } else {
            alert(data.message || "Invalid credentials");
        }
    })
    .catch(err => {
        console.error("Login failed:", err);
        alert("Could not connect to the authentication server.");
    });
}

        function fetchData() {
            const messageBox = document.getElementById('message-box');
            messageBox.innerText = "Loading data...";

            // REPLACE THIS URL with your actual live Render Web Service URL from Part 1
            const BACKEND_URL = "https://studentbackend-zzbp.onrender.com"; 

            // Make the network request to your server's endpoint
            fetch(`${BACKEND_URL}/api/message`)
                .then(response => response.json())
                .then(data => {
                    // Update the HTML page with the text sent by your server.js file
                    messageBox.innerText = data.text;
                })
                .catch(error => {
                    console.error("Error connecting:", error);
                    messageBox.innerText = "Failed to connect to backend.";
                });
        }
    </script>
</body>
</html>
