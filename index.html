<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Repo Connect</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        #message-box { font-weight: bold; color: #4CAF50; font-size: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Login Page</h2>
    <!-- FIXED: Calls handleFormSubmit() which correctly extracts the input values -->
    <form id="loginForm" ">
        <label>Username:</label><br>
        <input type="text" id="username" required><br><br>
        
        <label>Password:</label><br>
        <input type="password" id="password" required><br><br>
        
        <button type="button" onclick="loginUser()" >Login</button>
    </form>
    <p style="color: gray;">Hint: Use admin/password123 or user/password123</p>

    <h1>Frontend Repository Page</h1>
    <button onclick="fetchData()">Get Server Data</button>
    
    <div id="message-box">Click the button to load live data...</div>

    <script>
        // Global definition for backend URL to keep it consistent
        const BACKEND_URL = "https://studentbackend-zzbp.onrender.com"; 

        // FIXED: New handler function to bridge the form event to the loginUser function
        function handleFormSubmit() {
            const userVal = document.getElementById('username').value;
            const passVal = document.getElementById('password').value;
            loginUser(userVal, passVal);
        }

        async function loginUser() {
    // 1. Get the HTML elements by their IDs
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');

    // 2. Extract the text values entered by the user
    const username = usernameInput.value;
    const password = passwordInput.value;

    // 3. (Optional validation) Stop early if fields are empty
    if (!username || !password) {
        alert("Please enter both a username and password.");
        return;
    }

    // 4. Define your live backend URL
    //const BACKEND_URL = "https://onrender.com";

    try {
        // 5. Make the network request to your login endpoint
        const response = await fetch(`${BACKEND_URL}/login`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password }),
            credentials: 'include' // Allows cookies and session tracking
        });

        // 6. Read the JSON response data from the server
        const data = await response.json(); 
console.log("Success:", data.message);

        if (response.ok && data.success) {
            console.log("Success:", data.message);
            alert(data.message); // Displays "Login successful!"
            // Redirect your user here if needed: window.location.href = '/dashboard';
        } else {
            console.error("Login failed:", data.message); 
            alert(data.message); // Displays "Invalid username or password."
        }
    } catch (error) {
        console.error("Network error occurred:", error);
        alert("Failed to connect to login server.");
    }
}

        function fetchData() {
            const messageBox = document.getElementById('message-box');
            messageBox.innerText = "Loading data...";

            fetch(`${BACKEND_URL}/api/message`)
                .then(response => response.json())
                .then(data => {
                    messageBox.innerText = data.text;
                })
                .catch(error => {
                    console.error("Error connecting:", error);
                    messageBox.innerText = "Failed to connect to backend.";
                });
        }
    </script>
</body>
</html>
