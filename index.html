<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Repo Connect</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        #message-box { font-weight: bold; color: #4CAF50; font-size: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Login Page</h2>
    <!-- Cleaned up form setup with your new button type -->
    <form id="loginForm" onsubmit="event.preventDefault();">
        <label>Username:</label><br>
        <input type="text" id="username" required><br><br>
        
        <label>Password:</label><br>
        <input type="password" id="password" required><br><br>
        
        <button type="button" onclick="loginUser()">Login</button>
    </form>
    <p style="color: gray;">Hint: Use admin/password123 or user/password123</p>

    <h1>Frontend Repository Page</h1>
    <button onclick="fetchData()">Get Server Data</button>
    
    <div id="message-box">Click the button to load live data...</div>

    <script>
        const BACKEND_URL = "https://onrender.com"; 

        async function loginUser() {
            console.log("Login button clicked!"); // Check your console for this log!
            
            // 1. Correctly get the input elements and values
            const userField = document.getElementById('username');
            const passField = document.getElementById('password');

            if (!userField || !passField) {
                alert("HTML input elements are missing IDs!");
                return;
            }

            const username = userField.value;
            const password = passField.value;

            // 2. Validate empty inputs
            if (!username || !password) {
                alert("Please enter both a username and password.");
                return;
            }

            try {
                // 3. Fire the network request
                const response = await fetch(`${BACKEND_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });

                const data = await response.json(); 
                
                // 4. Handle the server data response
                if (response.ok) {
                    alert("Success! Server says: " + (data.message || data.text));
                } else {
                    alert("Server error: " + (data.message || "Failed"));
                }

            } catch (error) {
                console.error("Network error details:", error);
                alert("Failed to connect to login server. Please make sure your Render backend is updated and Live.");
            }
        }

        function fetchData() {
            const messageBox = document.getElementById('message-box');
            messageBox.innerText = "Loading data...";

            fetch(`${BACKEND_URL}/api/message`)
                .then(response => response.json())
                .then(data => {
                    messageBox.innerText = data.text;
                })
                .catch(error => {
                    console.error("Error connecting:", error);
                    messageBox.innerText = "Failed to connect to backend.";
                });
        }
    </script>
</body>
</html>
