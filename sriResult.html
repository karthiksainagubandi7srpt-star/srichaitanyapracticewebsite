<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View MySQL Users</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        body { background-color: aqua; font-family: Arial, sans-serif; padding: 20px; }
        #statusText { font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Registered Users List</h2>
    <!-- Linked the Refresh button to trigger the fetch function -->
    <button id="loadUsers" onclick="fetchTableData()">Refresh List</button>
    
    <!-- Added a missing status text element to display server messages -->
    <div id="statusText"></div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Rank</th>
                <th>Username</th>
                <th>Marks</th>
            </tr>
        </thead>
        <!-- Standardised the body ID to match the JavaScript selector -->
        <tbody id="userTableBody">
            <!-- Data will be loaded here dynamically -->
        </tbody>
    </table>

    <script>
    const RENDER_URL = 'https://studentbackend-zzbp.onrender.com';

    async function fetchTableData() {
        // Corrected IDs to match the HTML elements
        const tableBody = document.getElementById('userTableBody');
        const statusText = document.getElementById('statusText');
        
        // Clear previous data and status messages before fetching new data
        tableBody.innerHTML = '';
        statusText.textContent = 'Loading users...';
        statusText.style.color = 'black';
                
        try {
            const response = await fetch(`${RENDER_URL}/api/view-marks`);
            const data = await response.json();
            
            // Fixed syntax error: 'if (response.ok)' was completely missing
            if (response.ok && data.users) {
                statusText.textContent = ''; // Clear loading text
                
                data.users.forEach(user => {
                    const row = document.createElement('tr');
                    
                    // Aligned data keys with table header columns (Removed duplicate user.ID and user.Email)
                   row.innerHTML = `
                   <td><strong>Rank #${user.calculated_Rank}</strong></td>
                   <td>${user.id || ''}</td>
                   <td>${user.username || ''}</td>
                   <td>${user.marks || ''}</td>
                    `;

                    tableBody.appendChild(row);
                });
            } else {
                statusText.style.color = 'red';
                statusText.textContent = 'Server response error: ' + (data.message || 'Unknown error');
            }
        } catch (error) {
            console.error('Fetch execution error:', error);
            statusText.style.color = 'red';
            statusText.textContent = 'Network communication failure connecting to Render.';
        }
    }

    // Auto-fetch data on initial page load
    window.onload = fetchTableData;
    </script>
</body>
</html>
