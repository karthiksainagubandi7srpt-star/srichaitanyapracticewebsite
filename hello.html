<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: aqua;
    }
  </style>
</head>
<body>

  <label for="content">Enter Content</label>
  <input type="text" id="content" placeholder="ENTER DATA" required>
  <br>
  <button id="fetchBtn">SUBMIT</button>

  <p id="message"></p>

  <script>
    const RENDER_URL = 'https://testingserver-ush2.onrender.com';

    document.getElementById('fetchBtn').addEventListener('click', async () => {
        const hi = document.getElementById('content').value;
        const msg = document.getElementById('message');
        
        // Clear previous messages
        msg.innerText = '';

        if (!hi) {
            return msg.innerText = `Please enter content.`;
        }

        try {
            const response = await fetch(`${RENDER_URL}/api/fetch-message`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ hi })
            });
            
            const data = await response.json();
            
            // Fixed typo: innertext changed to innerText
            return msg.innerText = data.note;
        } catch (error) {
            console.error('Fetch error:', error);
            msg.innerText = 'Failed to connect to the server.';
        }
    });
  </script>
</body>
</html>
