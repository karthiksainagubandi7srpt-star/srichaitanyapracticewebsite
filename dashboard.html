<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SRI CHAITANYA COLLEGES</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html, body {
            height: 100vh;
            overflow: hidden;
            background-color: #f4f6f9;
        }

        .dashboard-container {
            display: grid;
            grid-template-rows: 70px 1fr;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            width: 100vw;
        }

        .top-panel {
            grid-column: span 2;
            background-color: #0d47a1;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 10;
        }

        .top-panel h2 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .admin-meta {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .admin-meta span {
            font-size: 0.95rem;
            background-color: rgba(255, 255, 255, 0.15);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .logout-btn {
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background 0.2s, transform 0.1s;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }
        
        .logout-btn:active {
            transform: scale(0.98);
        }

        .bottom-left-panel {
            background-color: #1e293b;
            color: #f8fafc;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 3px 0 10px rgba(0,0,0,0.05);
            overflow-y: auto;
        }

        .bottom-left-panel h3 {
            margin-top: 15px;
            color: #38bdf8;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
            padding-left: 10px;
        }
        
        .bottom-left-panel h3:first-child {
            margin-top: 0;
        }

        .bottom-left-panel a {
            text-decoration: none;
            color: #cbd5e1;
            font-size: 0.95rem;
            padding: 12px 14px;
            border-radius: 6px;
            transition: all 0.2s ease;
            display: block;
            font-weight: 500;
        }

        .bottom-left-panel a:hover {
            background-color: #334155;
            color: #38bdf8;
            padding-left: 20px;
        }

        .bottom-right-panel {
            background-color: #ffffff;
            position: relative;
            height: 100%;
            width: 100%;
        }

        .content-display-window {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="top-panel">
            <h2>SRI CHAITANYA COLLEGES</h2>
            <div class="admin-meta">
                <span>Active Session: <strong id="adminName">Loading...</strong></span>
                <a href="index.html" class="logout-btn" onclick="logout()">Sign Out</a>
            </div>
        </div>

        <div class="bottom-left-panel" id="sidebarMenu">
            <!-- Normal User Center Links -->
            <h3>Student Center</h3>
            <a href="sriResult.html" target="content-frame">🏆 View Rank List</a>
        </div>

        <div class="bottom-right-panel">
            <!-- Default iframe display stage -->
            <iframe src="right.html" name="content-frame" id="contentFrame" class="content-display-window"></iframe>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('authToken');
        const username = localStorage.getItem('username');
        const role = localStorage.getItem('role');

        if (!token || !role) {
            alert('Access denied. Redirecting.');
            localStorage.clear();
            window.location.href = 'index.html';
        } else {
            document.getElementById('adminName').textContent = `${username} (${role.toUpperCase()})`;
            const sidebar = document.getElementById('sidebarMenu');
            
            if (role === 'admin') {
                // Admin dynamic controls generation block
                sidebar.insertAdjacentHTML('beforeend', `
                    <h3>System Controls</h3>
                    <a href="create-user.html" target="content-frame">👤 Create New Portal User</a>

                    <h3>Student Management</h3>
                    <a href="applicationform.html" target="content-frame">➕ Register New Student</a>
                    <a href="sriDisplay.html" target="content-frame">📋 View All Registered Students</a>
                    
                    <h3>Performance & Marks</h3>
                    <a href="srienterStudentMarks.html" target="content-frame">🏆 Enter Student Marks</a>
                    
                    <h3>System Restrictions</h3>
                    <a href="/admin-secret-page" target="content-frame">🔒 Secure Admin Settings</a>
                `);
            } else {
                // Instantly force normal users to view their unique student center panel layout
                document.getElementById('contentFrame').src = 'normalUserDisplay.html';
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
