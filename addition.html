<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enter Student Marks</title>
    <style>
        body { background-color: aqua; font-family: Arial, sans-serif; padding: 20px; }
        #message { font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <h2>Enter Id</h2>
    
    <div id="addTwoNumbers">
        <label for="number1">Enter the FIRST NUMBER</label>
        <!-- Fixed typo: placeholder instead of place-holder -->
        <input type="number" id="number1" placeholder="ENTER FIRST NUMBER" required><br>
        <label for="number2">Enter the SECOND NUMBER</label>
        <input type="number" id="number2" placeholder="ENTER SECOND NUMBER" required><br>

        <button id="addBtn">Add Numbers</button><br>
        <label for="result">SUM OF NUMBERS</label>
        <!-- Added disabled so the user cannot manually type over the API result -->
        <input type="number" id="result" required disabled>
    </div>

    <br><hr><br>
    
    <p id="message"></p>

    <script>
        const RENDER_URL = 'https://testingserver-ush2.onrender.com';

        document.getElementById('addBtn').addEventListener('click', async () => {
            const num1 = document.getElementById('number1').value;
            const num2 = document.getElementById('number2').value;
            const msg = document.getElementById('message');
            const resultInput = document.getElementById('result');
            
            // Clear previous messages and results
            msg.innerText = '';
            resultInput.value = '';

            if (!num1 || !num2) {
                return msg.innerText = `Please enter ${!num1 ? 'First Number' : 'Second Number'}.`;
            }

            try {
                // Fixed: Corrected fetch syntax by wrapping options inside fetch arguments
                const response = await fetch(`${RENDER_URL}/api/fetch-sum`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        firstnumber: Number(num1), 
                        secondnumber: Number(num2) 
                    })
                });
                                   
                if (!response.ok) {
                    throw new Error('No Response From testingServer.');
                }  
                
                const data = await response.json();
                
                // Fixed: Changed getElementId to getElementById and assigned via .value
                resultInput.value = data.sum;
                msg.innerText = data.message || "Success!";
                
            } catch (err) {
                console.error(err);
                msg.innerText = "Error connecting to the server.";
            }
        }); // Fixed: Added missing closing brackets for the event listener
    </script>
</body>
</html>
