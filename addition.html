<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enter Student Marks</title>
    <style>
        body { background-color: aqua; font-family: Arial, sans-serif; padding: 20px; }
        #message { font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <h2>Enter Id</h2>
    
    <!-- Step 1: Find the User -->
    <div id="addTwoNumbers">
        <label for="firstno">Enter the FIRST NUMBER</label>
        <input type="number" id="number1" place-holder="ENTER FIRST NUMBER" required><br>
      <label for="secondno">Enter the SECOND NUMBER</label>
       <input type="number" id="number2" place-holder="ENTER SECOND NUMBER" required><br>

        <button id="addBtn">Add Numbers</button><br>
      <label for="result">SUM OF NUMBERS</label>
       <input type="number" id="result" required>
    </div>

    <br><hr><br>

    
    <p id="message"></p>

    <script>
        const RENDER_URL = 'https://testingserver-ush2.onrender.com';

        // 1. Fetch user data by ID
        document.getElementById('addBtn').addEventListener('click', async () => {
            const num1 = document.getElementById('number1').value;
            const num2 = document.getElementById('number2').value;
            const res = document.getElementById('result').value;
            const msg = document.getElementById('message');
            
           if (!num1 || !num2) return msg.innerText = `Please enter ${!num1 ? 'num1' : 'num2'}.`;

            try {
                // Pointing directly to the detailed student fetch route
                const response = await fetch(`${RENDER_URL}/api/fetch-sum`) {
                  method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            // Explicitly force clean types in the payload body
            body: JSON.stringify({ 
                firstnumber: Number(num1), 
                secondnumber: Number(num2) 
           })
                };
                                   
                if (!response.ok) {
                    throw new Error('No Response From testingServer.');
                }  
                const result = await response.json();
                document.getElementId('result')=result.sum;
    </script>
</body>
</html>
