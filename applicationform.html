<p id="message" class="custom-message"></p></b>

<script>
     const RENDER_URL = 'https://studentbackend-zzbp.onrender.com';
      

document.getElementById('userForm').addEventListener('submit', async (e) => {
    e.preventDefault(); // Prevent page reload

    // Gather all form values securely
    const payload = {
        username: document.getElementById('user-name').value,
        age: document.getElementById('user-age').value,
        email: document.getElementById('user-email').value,
        gender: document.querySelector('input[name="gender"]:checked').value,
        contactno: document.getElementById('user-contact-no').value,
        score10th: document.getElementById('user-10th-score').value,
        board: document.querySelector('input[name="board"]:checked').value,
        address: document.getElementById('user-address').value
    };

    try {
        // Send complete data payload to your Node.js backend
        const response = await fetch(`${RENDER_URL}/api/add-user`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        const result = await response.json();
        document.getElementById('message').innerText = result.message;
    } catch (error) {
        document.getElementById('message').innerText = 'Error connecting to server.';
    }
});
</script>
