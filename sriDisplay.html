<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View MySQL Users</title>
    <style>
        table { width: 50%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        body {
             background-color: aqua;
              }
    </style>
</head>
<body>
    <h2>Registered Users List</h2>
    <button id="loadUsers" onclick="">Refresh List</button>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Age</th>
                <th>gender</th>
                <th>contactNo</th>
                <th>score10th</th>
                <th>board</th>
                <th>address</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
            <!-- Data will be loaded here dynamically -->
        </tbody>
    </table>

    <script>
            const RENDER_URL = 'https://studentbackend-zzbp.onrender.com';

    async function fetchTableData() {
        const tableBody = document.getElementById('databaseTableBody');
        const statusText = document.getElementById('statusText');
        
        try {
            const response = await fetch(`${RENDER_URL}/api/view-users`);
            const data = await response.json();

           
                // Render out database table loops
                data.users.forEach(user => {
                    const row = document.createElement('tr');
                    
                    
                    
                    row.innerHTML = `
                        <td><strong>#${user.id}</strong></td>
                        <td>${user.username}</td>
                        <td>${user.ID}</td>
                        <td>${user.Email}</td>
                        <td>${user.Age}</td>
                        <td>${user.gender}</td>
                        <td>${user.contactNo}</td>
                        <td>${user.score10th}</td>
                        <td>${user.board}</td>
                        <td>${user.address}</td>
            
                                           `;
                    tableBody.appendChild(row);
                });
            } else {
                statusText.style.color = 'red';
                statusText.textContent = 'Server response error: ' + data.message;
            }
        } catch (error) {
            console.error('Fetch execution error:', error);
            statusText.style.color = 'red';
            statusText.textContent = 'Network communication failure connecting to Render.';
        }
    }

    // Initialize auto-fetch processing as soon as page component frames assemble
    window.onload = fetchTableData;
    </script>
</body>
</html>
