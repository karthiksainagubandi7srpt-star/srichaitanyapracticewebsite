<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | SRI CHAITANYA COLLEGES</title>
    <style>
        /* Base page layout reset matching core template */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html, body {
            height: 100vh;
            overflow: hidden;
            background-color: #f4f6f9;
        }

        body {
            display: grid;
            grid-template-rows: 70px 1fr; /* Top bar is 70px high */
            grid-template-columns: 280px 1fr; /* Sidebar menu is 280px wide */
        }

        /* 1. Top Panel Section */
        .top-panel {
            grid-column: span 2;
            background-color: #1a252f;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .top-panel h2 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .user-meta {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-meta span {
            font-size: 0.95rem;
            background-color: rgba(255, 255, 255, 0.15);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .logout-btn {
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background 0.2s, transform 0.1s;
            cursor: pointer;
            border: none;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }

        .logout-btn:active {
            transform: scale(0.98);
        }

        /* 2. Bottom-Left Panel (Sidebar Navigation for Student) */
        .bottom-left-panel {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            overflow-y: auto;
        }

        .bottom-left-panel h3 {
            margin-top: 0;
            color: #3498db;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid #34495e;
            padding-bottom: 10px;
        }

        /* Styling for navigation menu items */
        .bottom-left-panel a {
            text-decoration: none;
            color: #ecf0f1;
            font-size: 0.95rem;
            padding: 12px 15px;
            border-radius: 4px;
            transition: all 0.2s ease;
            display: block;
            font-weight: 500;
        }

        .bottom-left-panel a:hover {
            background-color: #34495e;
            color: #3498db;
            padding-left: 20px;
        }

        /* 3. Bottom-Right Panel (Main Content Stage) */
        .bottom-right-panel {
            background-color: #f8f9fa;
            position: relative;
            height: 100%;
            width: 100%;
        }

        /* The Frame that catches target="content-frame" link clicks */
        .content-display-window {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- 1. TOP BAR -->
    <div class="top-panel">
        <h2>SRI CHAITANYA COLLEGES</h2>
        <div class="user-meta">
            <span>Welcome, <strong id="studentName">Student</strong></span>
            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <!-- 2. BOTTOM-LEFT PANEL (Student Specific Navigation Links) -->
    <div class="bottom-left-panel">
        <h3>Performance & Academics</h3>
        <!-- Only features standard performance views, completely blocking registration pages -->
        
        <a href="sriDisplay.html" target="content-frame">Registered Users List</a>
        <a href="sriResult.html" target="content-frame">🏆 View My Rank List</a><br><br>
        <h3>Other Details</h3>
        <a href="table.html" target="content-frame">Fees Structure</a>
        <a href="campus view.html" target="content-frame">Campus View</a>
    </div>

    <!-- 3. BOTTOM-RIGHT PANEL (Target Window) -->
    <div class="bottom-right-panel">
        <!-- Default landing view framework matches student needs directly -->
        <iframe src="right.html" name="content-frame" class="content-display-window"></iframe>
    </div>

    <script>
        // 🔒 CRYPTOGRAPHIC SESSION GATE CHECK
        // Prevents users from manually bypassing login page by typing this URL directly
        const token = localStorage.getItem('authToken');
        const username = localStorage.getItem('username');
        const role = localStorage.getItem('role');

        if (!token || !role) {
            alert('Access denied. Missing valid login token.');
            localStorage.clear();
            window.location.href = 'index.html';
        } else {
            // Personalise the dashboard header text dynamically
            document.getElementById('studentName').textContent = username || 'Student';
        }

        // Secure Logout Handling Function
        function logout() {
            localStorage.clear(); // Clear tokens, usernames, and roles instantly
            window.location.href = 'index.html'; // Evict user back to authentication interface
        }
    </script>
</body>
</html>
