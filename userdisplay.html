<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
</head>
<body>
    <h1>Welcome to the User Display Panel</h1>
    <p>Hello, <span id="profileName">User</span>! Welcome back to your client profile hub.</p>
    <button onclick="logout()">Log Out</button>

    <script>
        // Security gate check to verify credentials exist in localStorage
        const username = localStorage.getItem('username');
        if (!username) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('profileName').textContent = username;
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
