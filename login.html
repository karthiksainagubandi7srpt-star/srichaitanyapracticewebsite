<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SRI CHAITANYA COLLEGES</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f6f9;
        }

        .login-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-header {
            color: #0d47a1; /* Sri Chaitanya Blue */
            margin-bottom: 5px;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .login-subheader {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #1e293b;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #0d47a1;
        }

        .login-btn {
            width: 100%;
            background-color: #0d47a1;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #0a3981;
        }

        #statusMessage {
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">SRI CHAITANYA COLLEGES</div>
        <div class="login-subheader">Portal Login Terminal</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username / ID</label>
                <input type="text" id="username" placeholder="Enter your username or user ID" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>
        
        <p id="statusMessage"></p>
    </div>

    <script>
        const RENDER_URL = 'https://onrender.com';

        // Auto-Forward Gate: Skip login if valid token session exists
        const savedToken = localStorage.getItem('authToken');
        const savedRole = localStorage.getItem('role');

        if (savedToken && savedRole) {
            window.location.href = 'dashboard.html'; 
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const statusMsg = document.getElementById('statusMessage');

            statusMsg.style.color = '#0d47a1';
            statusMsg.textContent = 'Verifying credentials...';

            try {
                const response = await fetch(`${RENDER_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    statusMsg.style.color = 'green';
                    statusMsg.textContent = 'Verification successful! Redirecting...';
                    
                    // Secure Session Management Storage
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role); // Server-provided string check ('admin' or 'user')
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 800);
                } else {
                    statusMsg.style.color = 'red';
                    statusMsg.textContent = data.message || 'Invalid username or password.';
                }
            } catch (error) {
                statusMsg.style.color = 'red';
                statusMsg.textContent = 'Network or system connection error.';
            }
        });
    </script>
</body>
</html>
