<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        .top-panel {
            grid-column: span 2;
            background-color: #1a252f;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .top-panel h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .logout-btn {
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }

        /* 2. Bottom-Left Panel (Sidebar Navigation) */
        .bottom-left-panel {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .bottom-left-panel h3 {
            margin-top: 0;
            color: #3498db;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #34495e;
            padding-bottom: 10px;
        }

        /* Styling for navigation menu items */
        .bottom-left-panel a {
            text-decoration: none;
            color: #ecf0f1;
            font-size: 1rem;
            padding: 12px 15px;
            border-radius: 4px;
            transition: all 0.2s;
            display: block;
        }

        .bottom-left-panel a:hover {
            background-color: #34495e;
            color: #3498db;
            padding-left: 20px;
        }

        /* 3. Bottom-Right Panel (Main Content Stage) */
        .bottom-right-panel {
            background-color: #f8f9fa;
            position: relative;
        }

        /* The Frame that catches target="content-frame" link clicks */
        .content-display-window {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff;
        }

    </style>
</head>
<body>
    <h1>Welcome to the Admin Display Panel</h1>
    <p>Logged in as: <strong id="adminName">Admin</strong></p>
    <hr>

    <h3>Create New User Profile Account</h3>
    <form id="createUserForm">
        <input type="text" id="newUsername" placeholder="Enter Username" required><br><br>
        <input type="password" id="newPassword" placeholder="Enter Password" required><br><br>
        <label for="newRole">Assign Role Type:</label>
        <select id="newRole">
            <option value="user">Standard User</option>
            <option value="admin">Administrator</option>
        </select><br><br>
        <button type="submit">Register Account</button>
    </form>
    
    <p id="statusMessage" style="font-weight: bold;"></p>
    <hr>
    <button onclick="logout()">Log Out</button>

    <script>
        const RENDER_URL = 'https://studentbackend-zzbp.onrender.com';
        
        // Security gate check to verify credentials exist in localStorage
        const adminUsername = localStorage.getItem('username');
        const role = localStorage.getItem('role');

        if (!adminUsername || role !== 'admin') {
            alert('Access denied. Redirecting back to login.');
            window.location.href = 'index.html';
        } else {
            document.getElementById('adminName').textContent = adminUsername;
        }

        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newUsername = document.getElementById('newUsername').value;
            const newPassword = document.getElementById('newPassword').value;
            const newRole = document.getElementById('newRole').value;
            const statusMsg = document.getElementById('statusMessage');

            try {
                const response = await fetch(`${RENDER_URL}/api/create-user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newUsername, newPassword, newRole, adminUsername })
                });

                const data = await response.json();

                if (data.success) {
                    statusMsg.style.color = 'green';
                    statusMsg.textContent = data.message;
                    document.getElementById('createUserForm').reset(); // Clear form fields
                } else {
                    statusMsg.style.color = 'red';
                    statusMsg.textContent = data.message;
                }
            } catch (error) {
                statusMsg.style.color = 'red';
                statusMsg.textContent = 'Server processing network error.';
            }
        });

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
